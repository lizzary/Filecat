name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sanitize-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitize:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ASan + UBSan share a build: both fit in one instrumented binary
          # and together they cover memory errors, leaks, and undefined
          # behavior. TSan is incompatible with ASan so it gets its own build.
          - label: asan+ubsan
            flags: -fsanitize=address,undefined -fno-omit-frame-pointer -g
          - label: tsan
            flags: -fsanitize=thread -fno-omit-frame-pointer -g

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_C_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.flags }}"

      - name: Build
        run: cmake --build build -j

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1:abort_on_error=1
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build --output-on-failure
