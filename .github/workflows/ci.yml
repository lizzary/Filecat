name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to the same branch cancels in-flight runs for that branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc-debug
            os: ubuntu-latest
            cc: gcc
            build_type: Debug
          - name: linux-gcc-release
            os: ubuntu-latest
            cc: gcc
            build_type: Release
            bench: true
          - name: linux-clang-release
            os: ubuntu-latest
            cc: clang
            build_type: Release
          - name: macos-clang-debug
            os: macos-latest
            cc: clang
            build_type: Debug
          - name: macos-clang-release
            os: macos-latest
            cc: clang
            build_type: Release
            bench: true
          - name: windows-msvc-debug
            os: windows-latest
            msvc: true
            build_type: Debug
          - name: windows-msvc-release
            os: windows-latest
            msvc: true
            build_type: Release
            bench: true

    steps:
      - uses: actions/checkout@v4

      - name: Select compiler (POSIX)
        if: runner.os != 'Windows'
        run: echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"

      # Imports cl.exe/link.exe and VS-bundled headers/libs into the
      # environment of all subsequent steps. Sidesteps CMake's vswhere-based
      # detection (which has been flaky on the windows-2025 image).
      - name: Set up MSVC environment
        if: matrix.msvc
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Ninja is a single-config generator on every platform, so the same
      # cmake / cmake --build / ctest commands work everywhere -- no more
      # multi-config --config branches. The runner image preinstalls ninja.
      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            ${{ matrix.msvc && '-G Ninja' || '' }} \
            ${{ matrix.bench && '-DFILECAT_BUILD_BENCH=ON' || '' }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        shell: bash
        run: cmake --build build -j

      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure
