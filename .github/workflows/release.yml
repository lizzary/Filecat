name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow dry-runs from the Actions UI without uploading a release.
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: filecat-linux-x86_64.tar.gz
          - name: macos-arm64
            os: macos-latest
            archive: filecat-macos-arm64.tar.gz
          - name: windows-x64
            os: windows-latest
            archive: filecat-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      # ---- POSIX (Linux + macOS) -------------------------------------------
      - name: Configure & build (POSIX)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DFILECAT_BUILD_TESTS=OFF
          cmake --build build -j

      - name: Package (POSIX)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging/lib staging/bin staging/include
          cp build/libfilecat.a       staging/lib/
          cp build/filecat-watch      staging/bin/
          cp -r include/filecat       staging/include/
          cp LICENSE README.md        staging/
          tar -czf "${{ matrix.archive }}" -C staging .

      # ---- Windows (MSVC) --------------------------------------------------
      - name: Configure & build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DFILECAT_BUILD_TESTS=OFF
          cmake --build build --config Release -j

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging\lib, staging\bin, staging\include -Force | Out-Null
          Copy-Item build\Release\filecat.lib        staging\lib\
          Copy-Item build\Release\filecat-watch.exe  staging\bin\
          Copy-Item -Recurse include\filecat         staging\include\
          Copy-Item LICENSE, README.md               staging\
          Compress-Archive -Path staging\* -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Skip the release step on manual dry-runs (no tag).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
